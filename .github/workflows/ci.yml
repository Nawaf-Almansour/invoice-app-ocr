name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Build: API ────────────────────────────────────────────────
  api-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npx eslint "{src,test}/**/*.ts"
      - run: npx prettier --check "src/**/*.ts"
      - run: npm run build

  # ── Tests: API ───────────────────────────────────────────────────────
  api-test:
    runs-on: ubuntu-latest
    needs: api-lint-build
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm test -- --no-coverage

  # ── Lint & Build: Web ───────────────────────────────────────────────
  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── Tests: OCR Worker ───────────────────────────────────────────────
  ocr-worker-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ocr-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/ocr-worker/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v

  # ── Docker Build ────────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [api-test, web-build, ocr-worker-test]
    strategy:
      matrix:
        service:
          - { context: apps/api, name: api }
          - { context: apps/ocr-worker, name: ocr-worker }
          - { context: apps/web, name: web }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: invoice-ocr/${{ matrix.service.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Scan ───────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: [api-test, ocr-worker-test]
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk (API)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --project-name=api --file=apps/api/package.json
      - name: Run Snyk (OCR Worker)
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --project-name=ocr-worker --file=apps/ocr-worker/requirements.txt
